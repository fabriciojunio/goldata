name: GolData CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install lightgbm shap

      - name: Lint with ruff
        run: ruff check goldata/ --output-format=github

      - name: Run tests
        run: |
          pytest \
            --cov=goldata \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v \
            --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff mypy
      - run: ruff check goldata/
      - run: ruff format --check goldata/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit
      - run: bandit -r goldata/ -x goldata/api/main.py --severity-level medium -q || true

  build-docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t goldata:latest -f docker/Dockerfile .
      - name: Test Docker health
        run: |
          docker run -d --name goldata_test -p 8000:8000 \
            -e SECRET_KEY="goldata-ci-test-secret-key-32chars!!" \
            -e API_KEY="ci-test-key" \
            goldata:latest
          sleep 15
          curl -f http://localhost:8000/health
          docker stop goldata_test
