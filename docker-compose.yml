version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: goldata_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://goldata:goldata@db:5432/goldata
      - DATABASE_URL_SYNC=postgresql+psycopg2://goldata:goldata@db:5432/goldata
      - SECRET_KEY=${SECRET_KEY:-goldata-production-secret-key-32chars!!}
      - API_KEY=${API_KEY:-goldata-api-key-production}
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    container_name: goldata_db
    environment:
      - POSTGRES_USER=goldata
      - POSTGRES_PASSWORD=goldata
      - POSTGRES_DB=goldata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goldata"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: goldata_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
